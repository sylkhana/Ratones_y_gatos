<!DOCTYPE html>
<html lang="es">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Gymkhana Ratones y Gatos - Acceso</title>
	<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
	<style>
		* {
		  box-sizing: border-box;
		  margin: 0;
		  padding: 0;
		}

		body {
		  font-family: 'Roboto', sans-serif;
		  background: linear-gradient(to right, #FF7F27, #22B14C);
		  min-height: 100vh;
		  display: flex;
		  justify-content: center;
		  align-items: center;
		  padding: 1rem;
		}

		.marco {
		  background: #fff;
		  width: 90%;
		  max-width: 400px;
		  padding: 2rem;
		  border-radius: 1rem;
		  box-shadow: 0 1rem 2rem rgba(0,0,0,0.2);
		  text-align: center;
		}

		.marco h1 {
		  color: #FF7F27;
		  font-size: 2rem;
		  margin-bottom: 1.5rem;
		}

		.marco input {
		  width: 100%;
		  padding: 0.8rem 1rem;
		  margin-bottom: 1rem;
		  font-size: 1rem;
		  border: 1px solid #ccc;
		  border-radius: 0.5rem;
		  transition: border-color 0.3s;
		}

		.marco input:focus {
		  border-color: #FFF200;
		  outline: none;
		}

		.marco button {
		  width: 100%;
		  padding: 0.8rem 0;
		  font-size: 1rem;
		  font-weight: 700;
		  border: none;
		  border-radius: 0.5rem;
		  background: #22B14C;
		  color: #fff;
		  cursor: pointer;
		  transition: background 0.3s;
		}

		.marco button:hover {
		  background: #FFF200;
		}

		/* Media queries para móviles muy pequeños */
		@media (max-width: 350px) {
		  .marco {
			padding: 1rem;
		  }
		  .marco h1 {
			font-size: 1.5rem;
		  }
		  .marco input, .marco button {
			font-size: 0.9rem;
			padding: 0.6rem;
		  }
		}

		/*Mensajes de aviso*/
		.modal {
		  position: fixed;
		  inset: 0;
		  background: rgba(0,0,0,0.6);
		  display: flex;
		  justify-content: center;
		  align-items: center;
		  z-index: 9999;
		}

		.modal.hidden {
		  display: none;
		}

		.modal-box {
		  background: white;
		  padding: 1.5rem;
		  border-radius: 1rem;
		  width: 90%;
		  max-width: 400px;
		  text-align: center;
		  box-shadow: 0 1rem 2rem rgba(0,0,0,0.3);
		}

		.modal-box h2 {
		  color: #FFF200;
		  margin-bottom: 1rem;
		}

		.modal-box button {
		  margin-top: 1rem;
		  padding: 0.6rem 1.2rem;
		  background: #FFF200;
		  color: white;
		  border: none;
		  border-radius: 0.5rem;
		  font-weight: 700;
		}
	</style>

</head>

<body>

	<!-- DISEÑO FORM BASE -->
	<div class="marco">
		<h1>Acceso</h1> 
		<input type="text" id="jugador" name="jugador" placeholder="Jugador" required>
		<input type="password" id="clave" name="clave" placeholder="Código" required>
		<button onclick="entrar()">Entrar</button>
	</div>

	<!-- DISEÑO MODAL -->
	<div id="modal" class="modal hidden">
	  <div class="modal-box">
		<h2 id="modal-title">Aviso</h2>
		<p id="modal-text"></p>
		<button onclick="cerrarModal()">Aceptar</button>
	  </div>
	</div>


	<script> 
		//ENTRAR
		async function entrar() {
		
			const jugador = document.getElementById('jugador').value;
			const clave = document.getElementById('clave').value;

			const res = await fetch("https://script.google.com/macros/s/AKfycbxG0-TddGcYraqw7FaVklnnSTw6Z-GMh0D7FX5F7WEsHbztk6i118RLJbj0SXA3RYb0vA/exec", {
				method: "POST",
				body: new URLSearchParams({
					func: "entrar",
					jugador: jugador,
					clave: clave
				})
			});
			const data = await res.json();
			
			if (data.jugador === '') {
				mostrarModal("Credenciales incorrectas");
			} 
			else {
				sessionStorage.setItem("jugador", data.jugador);
				sessionStorage.setItem("equipo", data.equipo);
				
				if (data.rol === "RATON") {
					window.location.href = "raton.html";
				}
				else {
					window.location.href = "gato.html";
				}
				
			}
		}
		
		
		//MODAL
		function mostrarModal(texto, titulo = 'Aviso') {
			document.getElementById('modal-title').textContent = titulo;
			document.getElementById('modal-text').textContent = texto;
			document.getElementById('modal').classList.remove('hidden');
		}

		function cerrarModal() {
		  document.getElementById('modal').classList.add('hidden');
		}
	
		//ERROR LOGIN
		const params = new URLSearchParams(window.location.search);

		if (params.get("error")) {
		  mostrarModal("Credenciales incorrectas");
		}
	</script>

</body>
</html>
