<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gymkhana Ratones y Gatos - Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin:0; padding:0; }
    body { font-family: 'Roboto', sans-serif; background: linear-gradient(to right,#6a11cb,#A119CB); min-height:100vh; display:flex; justify-content:center; align-items:center; padding:1rem; }
    .marco { background:#fff; width:90%; max-width:400px; padding:2rem; border-radius:1rem; box-shadow:0 1rem 2rem rgba(0,0,0,0.2); text-align:center; }
    .marco h1 { color:#A119CB; font-size:2rem; margin-bottom:1.5rem; }
    .marco input { width:100%; padding:0.8rem 1rem; margin-bottom:1rem; font-size:1rem; border:1px solid #ccc; border-radius:0.5rem; }
    .marco button { width:100%; padding:0.8rem 0; font-size:1rem; font-weight:700; border:none; border-radius:0.5rem; background:#A119CB; color:#fff; cursor:pointer; }
    .marco button:hover { background:#6a11cb; }
  </style>
</head>
<body>

  <div class="marco">
    <h1>Acceso</h1>
    <form method="POST" action="https://script.google.com/macros/s/AKfycbxlE5Q0MomAr0m2b4_8Vrz2Ogm1q-SCDeGzU0XRQY11wF_vqXSgrs3hd293LIeEdtKqEg/exec">
      <input type="text" name="jugador" placeholder="Jugador" required autocomplete="username">
      <input type="password" name="clave" placeholder="Código" required autocomplete="current-password">
      <button type="submit">Entrar</button>
    </form>
  </div>

</body>
</html>
