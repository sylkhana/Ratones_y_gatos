<!DOCTYPE html>
<html lang="es">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Gymkhana Ratones y Gatos - Quesito</title>

	<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">

	<style>
		* {
		  box-sizing: border-box;
		  margin: 0;
		  padding: 0;
		}
		:root {
		  --color-intenso: #ffff;
		  --color-suave: #ffff;
		}		

		body {
			  font-family: 'Roboto', sans-serif;
			  background: linear-gradient(to right, #FF7F27, #22B14C);
			  min-height: 100vh;
			  display: flex;
			  justify-content: center;
			  align-items: center;
			  padding: 1rem;
			}

		.marcoblanco {
		  background: #fff;
		  width: 90%;
		  max-width: 400px;
		  padding: 2rem;
		  border-radius: 1rem;
		  box-shadow: 0 1rem 2rem rgba(0,0,0,0.2);
		  text-align: center;
		}

		.bm { /*Bloque intenso*/
		  background: var(--color-intenso);
		  color: white;
		  padding: 1rem;
		  border-radius: 0.8rem;
		  margin-bottom: 1.5rem;
		  font-size: 1.5rem;
		}

		.bl {/*Bloque suave*/
		  padding: 1rem;
		  border-radius: 0.8rem;
		  margin-bottom: 1rem;
		  text-align: center;
		  background: var(--color-suave);
		  border-left: 5px solid var(--color-intenso);
		  border-right: 5px solid var(--color-intenso);
		  font-size: 1.2rem;
		  font-weight: 700;
		  line-height: 0.5;
		}
		
		.bg { /*Bloque gris*/
		  background: #f5f5f5;
		  border-radius: 0.6rem;
		  padding: 0.6rem;
		  margin-bottom: 1.5rem;
		  font-size: 0.9rem;
		}	

		.tm{ /*Texto intenso*/
		  margin-bottom: 1rem;
		  font-weight: 700;
		  color: var(--color-intenso);
		}

		.t { /* Texto normal */
		}

		.input {/* Input */
		  width: 100%;
		  padding: 0.8rem 1rem;
		  margin-bottom: 1rem;
		  font-size: 1rem;
		  border: 1px solid #ccc;
		  border-radius: 0.5rem;
		  transition: border-color 0.3s;
		}
	
		.input:focus {
		  border-color: #FFF200;
		  outline: none;
		}	

		.btn {/* Botón intenso */
		  width: 100%;
		  margin-top: 1rem;
		  padding: 0.8rem;
		  border: none;
		  border-radius: 0.5rem;
		  background: var(--color-intenso);
		  color: white;
		  font-weight: 700;
		  cursor: pointer;
		}

		.btn:hover {/* Cambio de color del btn al pasar el cursor*/
		  background: #FFF200;
		}
	
		img {
		  max-width: 100%;
		  height: auto;
		  display: block;
		}
	
		/* Tabla responsive */
		.tabla-wrapper {
		  width: 100%;
		  overflow-x: auto;
		  margin-top: 1.5rem;
		}

		table {
		  width: 100%;
		  max-width: 420px;
		  border-collapse: collapse;
		}

		th, td {
		  border: 1px solid #ccc;
		  padding: 0.5rem;
		  text-align: center;
		  font-size: 0.95rem;
		}

		th {
		  background: var(--color-intenso);
		  font-weight: 700;
		}	
	
		.columnas {
		  display: flex;
		  gap: 1rem;
		  justify-content: center;
		}	
		
		/* Media queries para móviles muy pequeños */
		@media (max-width: 350px) {
		  .marco {
			padding: 1rem;
		  }
		  .marco h1 {
			font-size: 1.5rem;
		  }
		  .marco input, .marco button {
			font-size: 0.9rem;
			padding: 0.6rem;
		  }
		}

		/*Mensajes modales de aviso*/
		.modal {
		  position: fixed;
		  inset: 0;
		  background: rgba(0,0,0,0.6);
		  display: flex;
		  justify-content: center;
		  align-items: center;
		  z-index: 9999;
		}

		.modal.hidden {
		  display: none;
		}

		.modal-box {
		  background: white;
		  padding: 1.5rem;
		  border-radius: 1rem;
		  width: 90%;
		  max-width: 400px;
		  text-align: center;
		  box-shadow: 0 1rem 2rem rgba(0,0,0,0.3);
		}

		.modal-box h2 {
		  color: var(--color-intenso);
		  margin-bottom: 1rem;
		}

		.modal-box button {
		  margin-top: 1rem;
		  padding: 0.6rem 1.2rem;
		  background: var(--color-intenso);
		  color: white;
		  border: none;
		  border-radius: 0.5rem;
		  font-weight: 700;
		}
</style>
</head>

<body>

	<div class="marcoblanco">
		<div class="bm" id = "txt_equipo">EQUIPO</div>
		<div class="bl">RATÓN</div>
		<div class="bg" id = "txt_ubicacion">📍 Ubicacion: Cargando...</div>

		<div class="tm"></br>¡Aquí está tu quesito! Resuelve esta prueba para conseguirlo:</div>
		<img id="img_prueba">
		<div class="t" id="txt_pregunta">Cargando...</div>
		<input class="input" type="text" id="inp_respuesta" placeholder="Introducir respuesta..." required>
		<div class = "columnas">
			<div class="btn" id = "btn_huir" onclick="huir()">Huir</div>
			<div class="btn" id = "btn_enviar" onclick="enviar()">Enviar</div>
		</div>
	</div>
	
	<!-- MODAL -->
	<div id="modal" class="modal hidden">
	  <div class="modal-box">
		<h2 id="modal-title">Aviso</h2>
		<p id="modal-text"></p>
		<button onclick="cerrarModal()">Aceptar</button>
	  </div>
	</div>	
		
	<script> //BBDD
		async function consultarQuesito()  {
			const res = await fetch("https://script.google.com/macros/s/AKfycbxG0-TddGcYraqw7FaVklnnSTw6Z-GMh0D7FX5F7WEsHbztk6i118RLJbj0SXA3RYb0vA/exec", {
				method: "POST",
				body: new URLSearchParams({
					func: "consultarQuesito",
					ratonera: ratonera,
					quesito: quesito
				})
			});		
			const data = await res.json();

			//Guardamos la respuesta_ok en el almacen para luego validarla
			sessionStorage.setItem('respuesta_ok', data.respuesta_ok);
			
			//Pintamos elementos del formulario
			document.getElementById('txt_equipo').textContent = "Equipo " + equipo;
			document.getElementById('txt_ubicacion').textContent = "📍 Ubicacion: " + data.ubicacion;
			document.getElementById('txt_pregunta').textContent = data.pregunta;
						
		}
		
		async function enviar() {
			const respuesta = document.getElementById('inp_respuesta').value.toUpperCase()
			const respuesta_ok = sessionStorage.getItem('respuesta_ok')
			if (respuesta_ok !== respuesta) {
				mostrarModal("Respuesta incorrecta")
			}
			else {
				//comerQuesito
				const res = await fetch("https://script.google.com/macros/s/AKfycbxG0-TddGcYraqw7FaVklnnSTw6Z-GMh0D7FX5F7WEsHbztk6i118RLJbj0SXA3RYb0vA/exec", {
					method: "POST",
					body: new URLSearchParams({
						func: "comerQuesito",
						equipo:equipo,
						jugador: jugador,
						ratonera: ratonera,
						quesito: quesito
					})
				});		
				const data = await res.json();
				//Guardamos datos en el almacen
				sessionStorage.setItem('rol', data.rol);
				sessionStorage.setItem('ratonera', data.ratonera);
				sessionStorage.setItem('quesito', data.quesito);
			
				//Comprobamos a donde hay que redireccionar
				if (data.rol === "GATO") {
					mostrarModal(data.mensaje)
					window.destino = "gato.html";
				}
				else if (data.quesito === "0") {
					window.destino = "raton.html";
				}
				else {
					//Redirigimos al quesito
					window.destino = "trampa.html";					
				}
				
				//Redireccionamos, pasando antes por el modal, si corressponde
				if (data.mensaje !== ""){
					//guardar destino para después de cerrar el modal (si el quesito está bloqueado, trampa.html y, si no, quesito.html
					window.destino = (data.desbloqueado === "0") ? "trampa.html" : "quesito.html";
					mostrarModal(data.mensaje)
				}
				else {
					//Redirigimos directamente
					window.location.href = window.destino
				}
					
				return;

			}
		}
		
		async function huir() {
		
			//CONFIRMACION
			const ok = await mostrarConfirmacion("¿Seguro?");
			
			if (ok) {
				//DESACTIVAR TRAMPA
				const res = await fetch("https://script.google.com/macros/s/AKfycbxG0-TddGcYraqw7FaVklnnSTw6Z-GMh0D7FX5F7WEsHbztk6i118RLJbj0SXA3RYb0vA/exec", {
					method: "POST",
					body: new URLSearchParams({
						func: "abandonar",
						equipo:equipo,
						jugador: jugador,
						ratonera: ratonera
					})
				});		
				const data = await res.json();				

				//Comprobamos a donde hay que redireccionar
				window.destino = data.rol + ".html";
				
				//Redireccionamos, pasando antes por el modal, si corressponde
				if (data.mensaje !== ""){
					mostrarModal(data.mensaje)	
				}
				else {
					//Redirigimos directamente
					window.location.href = window.destino
				}
			}
			return;
		}	
	</script>
	<script> //Funciones modales
		function mostrarModal(texto, titulo = 'Aviso') {
			document.getElementById('modal-title').textContent = titulo;
			document.getElementById('modal-text').textContent = texto;
			document.getElementById('modal').classList.remove('hidden');
		}

		function cerrarModal() {
			document.getElementById('modal').classList.add('hidden');
			
			//Si había un destino guardado, redirigimos
			if (window.destino) {window.location.href = window.destino;}
		}

		function mostrarConfirmacion(texto, titulo = "Confirmar") {
		  return new Promise(resolve => {
			document.getElementById('confirm-title').textContent = titulo;
			document.getElementById('confirm-text').textContent = texto;
			document.getElementById('modal-confirm').classList.remove('hidden');

			// guardamos el resolve para usarlo luego
			window._resolverConfirm = resolve;
		  });
		}
		function confirmarAccion(respuesta) {
		  document.getElementById('modal-confirm').classList.add('hidden');

		  if (window._resolverConfirm) {
			window._resolverConfirm(respuesta);
			window._resolverConfirm = null;
		  }
		}		
	</script>
	
	<script> //main
		
		//Recuperamos datos del almacen
		const equipo = sessionStorage.getItem('equipo');
		if (equipo === "NARANJA") {
			document.documentElement.style.setProperty("--color-intenso", "#FF7F27");
			document.documentElement.style.setProperty("--color-suave", "#F1BA72");
		}
		else {
			document.documentElement.style.setProperty("--color-intenso", "#22B14C");
			document.documentElement.style.setProperty("--color-suave", "#9EF7B3");
		}		
		const jugador = sessionStorage.getItem('jugador');
		const ratonera = sessionStorage.getItem('ratonera');
		const quesito = sessionStorage.getItem('quesito');
		
		
		//Estableceer la imagen de la prueba del quesito
		const img_prueba = document.getElementById('img_prueba');
		extension = ".png"
		if (ratonera[1] === "4") {
			extension = ".gif"
		}
		img_prueba.src = 'Quesitos/R' + ratonera[1] +'Q' + quesito.toString() + extension;
		
		//Obtener la info del quesito
		consultarQuesito();
	</script>


</body>
</html>
